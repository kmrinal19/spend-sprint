<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
		<meta name="theme-color" content="#3b82f6" />
		<meta name="description" content="Personal expense tracker — offline-first PWA" />

		<!-- iOS PWA -->
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="SpendSprint" />
		<meta name="format-detection" content="telephone=no" />
		<link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/icons/apple-touch-icon-180.png" />

		<link rel="manifest" href="%sveltekit.assets%/manifest.json" />
		<link rel="icon" type="image/png" href="%sveltekit.assets%/favicon.png" />

		<!-- Prevent FOUC for dark mode -->
		<script>
			(function () {
				const theme = localStorage.getItem('spendsprint-theme');
				if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
					document.documentElement.classList.add('dark');
				}
			})();
		</script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
